<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tablón Colaborativo Pro</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
</head>
<body>
    <div class="toolbar">
        <button id="btnPincel" class="active">✏️ Pincel</button>
        <button id="btnMover">✋ Mover</button>
        <button id="btnRect">🟩 Cuadrado</button>
        <button id="btnCirc">🔵 Círculo</button>
        
        <input type="file" id="imageUpload" accept="image/*" style="display: none;">
        <button id="btnImg">🖼️ Imagen</button>

        <div class="control">
            <input type="color" id="colorPicker" value="#000000">
        </div>
        <div class="control">
            <input type="range" id="lineWidth" min="1" max="50" value="5">
        </div>
        <button id="clear" class="danger">🗑️ Limpiar</button>
    </div>
    
    <canvas id="pizarra"></canvas>
    
    <script src="js/canvas.js"></script>
    <script type="module" src="js/sync.js"></script>
</body>
</html>
